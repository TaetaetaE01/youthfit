spring:
  application:
    name: youthfit

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:youthfit}
    username: ${DB_USER:youthfit}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-local-dev-minimum-32-bytes!!}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}   # 30분
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1209600000} # 14일

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}

openai:
  embedding:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}
  chat:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_CHAT_MAX_TOKENS:2048}
  qna:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_QNA_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_QNA_MAX_TOKENS:1024}
  ingestion:
    period:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_INGESTION_PERIOD_MODEL:gpt-4o-mini}
      max-tokens: ${OPENAI_INGESTION_PERIOD_MAX_TOKENS:128}
      max-body-chars: ${OPENAI_INGESTION_PERIOD_MAX_BODY_CHARS:3000}

youthfit:
  internal:
    api-key: ${INTERNAL_API_KEY:}
  cost-guard:
    # 빈 값이면 전체 허용 (prod default). 채우면 해당 정책만 LLM/임베딩 호출 허용.
    policy-allowlist: ${POLICY_ALLOWLIST:}
  qna:
    cache-ttl-hours: ${QNA_CACHE_TTL_HOURS:24}
    # 한국어 임베딩 cosine distance. 더 엄격: 0.5~0.6, 더 관대: 0.8. RagSearchService 로그로 운영값 조정.
    relevance-distance-threshold: ${QNA_RELEVANCE_DISTANCE_THRESHOLD:0.7}

attachment:
  storage:
    type: ${ATTACHMENT_STORAGE_TYPE:local}
    local-path: ${ATTACHMENT_STORAGE_LOCAL_PATH:/data/attachments}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:ap-northeast-2}
      access-key-id: ${S3_ACCESS_KEY_ID:}
      secret-access-key: ${S3_SECRET_ACCESS_KEY:}
  download:
    connect-timeout-seconds: ${ATTACHMENT_DOWNLOAD_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${ATTACHMENT_DOWNLOAD_READ_TIMEOUT_SECONDS:60}
    max-size-mb: ${ATTACHMENT_DOWNLOAD_MAX_SIZE_MB:50}
  extraction:
    min-text-chars: ${ATTACHMENT_EXTRACTION_MIN_TEXT_CHARS:100}
    retry-limit: ${ATTACHMENT_EXTRACTION_RETRY_LIMIT:3}
  reindex:
    max-content-kb: ${ATTACHMENT_REINDEX_MAX_CONTENT_KB:200}
  scheduler:
    fixed-delay-ms: ${ATTACHMENT_SCHEDULER_FIXED_DELAY_MS:60000}
    batch-size: ${ATTACHMENT_SCHEDULER_BATCH_SIZE:20}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:youthfit}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.youthfit: DEBUG
    org.springframework.security: DEBUG

attachment:
  storage:
    local-path: /tmp/youthfit-attachments

youthfit:
  cost-guard:
    # local 기본: 토큰 절약을 위해 정책 7·30 만 LLM/임베딩 호출 허용. shell 또는 .env 의 POLICY_ALLOWLIST 로 override 가능.
    policy-allowlist: ${POLICY_ALLOWLIST:7,30}

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.youthfit: INFO

spring:
  application:
    name: youthfit

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:youthfit}
    username: ${DB_USER:youthfit}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-local-dev-minimum-32-bytes!!}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}   # 30분
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:1209600000} # 14일

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}

openai:
  embedding:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}
  chat:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_CHAT_MAX_TOKENS:2048}
  qna:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_QNA_MODEL:gpt-4o-mini}
    max-tokens: ${OPENAI_QNA_MAX_TOKENS:1024}

youthfit:
  internal:
    api-key: ${INTERNAL_API_KEY:}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:youthfit}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.youthfit: DEBUG
    org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.youthfit: INFO
